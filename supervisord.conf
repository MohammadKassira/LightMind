[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
logfile_maxbytes=50MB
logfile_backups=2

[program:uvicorn]
command=uvicorn main:app --host 0.0.0.0 --port 7860
directory=/app
autostart=true
autorestart=true
priority=1
startsecs=30
stdout_logfile=/tmp/uvicorn.log
stderr_logfile=/tmp/uvicorn.log

[program:xvfb]
command=Xvfb :99 -screen 0 1280x800x24
autostart=true
autorestart=true
priority=10
stdout_logfile=/tmp/xvfb.log
stderr_logfile=/tmp/xvfb.log

[program:fluxbox]
command=fluxbox -display :99
autostart=true
autorestart=true
priority=20
startsecs=2
stdout_logfile=/tmp/fluxbox.log
stderr_logfile=/tmp/fluxbox.log

[program:x11vnc]
command=x11vnc -display :99 -nopw -listen localhost -xkb -forever -shared
autostart=true
autorestart=true
priority=30
startsecs=3
stdout_logfile=/tmp/x11vnc.log
stderr_logfile=/tmp/x11vnc.log

[program:websockify]
command=bash -c "i=0; until bash -c 'echo > /dev/tcp/localhost/5900' 2>/dev/null; do i=$((i+1)); [ $i -ge 120 ] && exit 1; sleep 0.5; done; exec websockify --web /usr/share/novnc 6080 localhost:5900"
autostart=true
autorestart=true
priority=40
startsecs=4
stdout_logfile=/tmp/websockify.log
stderr_logfile=/tmp/websockify.log
