[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
logfile_maxbytes=50MB
logfile_backups=2

[program:xvfb]
command=Xvfb :99 -screen 0 1280x800x24
autostart=true
autorestart=true
priority=1
stdout_logfile=/tmp/xvfb.log
stderr_logfile=/tmp/xvfb.log

[program:fluxbox]
command=fluxbox -display :99
autostart=true
autorestart=true
priority=2
startsecs=2
stdout_logfile=/tmp/fluxbox.log
stderr_logfile=/tmp/fluxbox.log

[program:x11vnc]
command=x11vnc -display :99 -nopw -listen localhost -xkb -forever -shared
autostart=true
autorestart=true
priority=3
startsecs=3
stdout_logfile=/tmp/x11vnc.log
stderr_logfile=/tmp/x11vnc.log

[program:websockify]
command=bash -c "until bash -c 'echo > /dev/tcp/localhost/5900' 2>/dev/null; do sleep 0.5; done; exec websockify --web /usr/share/novnc 6080 localhost:5900"
autostart=true
autorestart=true
priority=4
startsecs=4
stdout_logfile=/tmp/websockify.log
stderr_logfile=/tmp/websockify.log

[program:uvicorn]
command=uvicorn main:app --host 0.0.0.0 --port 7860
directory=/app
autostart=true
autorestart=true
priority=5
startsecs=5
stdout_logfile=/tmp/uvicorn.log
stderr_logfile=/tmp/uvicorn.log
