# grid4x4 single-network synchronous parallel DQN training
# Run: python train.py --config configs/grid4x4_sync.yaml 2>&1 | tee training_sync.log
# Monitor: python check_training.py --log training_sync.log --ckpt checkpoints/grid4x4_sync

network:
  net:        networks/external/RESCO/grid4x4/grid4x4.net.xml
  rou:        networks/external/RESCO/grid4x4/grid4x4_1.rou.xml
  begin_time: 0
  name:       grid4x4

model:
  hidden_dim: 128
  embed_dim: 64
  head_hidden_dim: 64
  # Ceiling dims — model built with these, not probed actuals
  max_obs_dim: 80
  max_phase_feat_dim: 32
  gat:
    num_heads: 4
    out_per_head: 32
    num_layers: 2
    l2_out_per_head: 16
    typed_edges: true
    zero_hop: false
    neighbor_masking: true

trainer:
  lr: 0.0001
  replay_buffer_size: 50000
  batch_size: 64
  # Per-buffer warmup: gradient steps begin only after this many transitions collected
  warmup_steps: 5000
  gamma: 0.99
  grad_clip: 10.0
  epsilon_start: 1.0
  epsilon_end: 0.05
  # Global decay across all steps (not per-worker)
  epsilon_decay_steps: 400   # gradient steps — decays over ~full 500-ep run (~472 grad steps)
  target_tau: 0.01           # Polyak soft update per gradient step (replaces hard periodic copy)
  num_episodes: 500
  num_workers: 2
  checkpoint_every: 50
  checkpoint_dir: "checkpoints/grid4x4_sync"

reward:
  use_pressure: true
  scale: 20

perception:
  severity: 0.05
  sentinel_value: -1.0

seed: 42
