model:
  hidden_dim: 128
  embed_dim: 64          # NodeEncoder output; GAT layer-1 input
  head_hidden_dim: 64
  gat:
    num_heads: 4
    out_per_head: 32       # Layer 1: 4*32 = 128
    num_layers: 2
    l2_out_per_head: 16    # Layer 2: 4*16 = 64 → PhaseHead input
    zero_hop: false

trainer:
  lr: 0.0003
  replay_buffer_size: 50000
  batch_size: 64
  warmup_steps: 1000
  gamma: 0.99
  grad_clip: 10.0
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 20000
  target_update_steps: 1000
  num_episodes: 300
  checkpoint_every: 100
  checkpoint_dir: "checkpoints/r5_2hop"

reward:
  use_pressure: true

perception:
  severity: 0.0
  sentinel_value: -1.0

seed: 1
