services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - ./website/backend/data:/app/data
    environment:
      - SUMO_HOME=/usr/share/sumo
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DISPLAY=:99
    restart: unless-stopped
